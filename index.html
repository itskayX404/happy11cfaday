<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404 - Halaman Tidak Ditemukan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Caveat:wght@500;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Floating particles background */
    .particles {
      position: absolute;
      width: 100%;
      height: 100%;
      overflow: hidden;
      z-index: 1;
    }

    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: rgba(255,255,255,0.3);
      border-radius: 50%;
      animation: float 15s infinite ease-in-out;
    }

    @keyframes float {
      0%, 100% { 
        transform: translateY(0) translateX(0) scale(1);
        opacity: 0;
      }
      10% { opacity: 0.3; }
      50% { 
        transform: translateY(-100vh) translateX(50px) scale(1.5);
        opacity: 0.6;
      }
      90% { opacity: 0.3; }
    }

    /* Main container */
    .error-container {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 2rem;
      max-width: 600px;
      animation: fadeInUp 1s ease-out;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* 404 Number */
    .error-code {
      font-size: clamp(80px, 15vw, 180px);
      font-weight: 700;
      color: rgba(255,255,255,0.15);
      text-shadow: 0 0 20px rgba(255,255,255,0.3);
      line-height: 1;
      margin-bottom: 10px;
      letter-spacing: 10px;
      animation: glitch 3s infinite;
    }

    @keyframes glitch {
      0%, 90%, 100% {
        transform: translate(0);
        text-shadow: 0 0 20px rgba(255,255,255,0.3);
      }
      92% {
        transform: translate(-2px, 2px);
        text-shadow: 2px 0 rgba(255,0,255,0.5), -2px 0 rgba(0,255,255,0.5);
      }
      94% {
        transform: translate(2px, -2px);
        text-shadow: -2px 0 rgba(255,0,255,0.5), 2px 0 rgba(0,255,255,0.5);
      }
    }

    /* Content card */
    .error-card {
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(20px);
      border-radius: 30px;
      padding: 3rem 2.5rem;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      position: relative;
      overflow: hidden;
    }

    .error-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, #667eea, #764ba2, #667eea);
      background-size: 200% 100%;
      animation: shimmer 3s infinite;
    }

    @keyframes shimmer {
      0% { background-position: 0% 0%; }
      100% { background-position: 200% 0%; }
    }

    /* Icon */
    .error-icon {
      font-size: 80px;
      margin-bottom: 1rem;
      display: inline-block;
      animation: bounce 2s infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    /* Text content */
    .error-title {
      font-size: clamp(24px, 5vw, 36px);
      font-weight: 700;
      color: #2d3748;
      margin-bottom: 1rem;
      line-height: 1.3;
    }

    .error-message {
      font-size: clamp(14px, 3vw, 18px);
      color: #4a5568;
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    /* Custom text - EDIT INI untuk ganti teks */
    .error-custom {
      font-family: 'Caveat', cursive;
      font-size: clamp(18px, 4vw, 28px);
      color: #667eea;
      margin-bottom: 2rem;
      padding: 1rem;
      background: rgba(102, 126, 234, 0.1);
      border-radius: 15px;
      border-left: 4px solid #667eea;
    }

    /* Buttons */
    .error-actions {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      padding: 0.8rem 2rem;
      border-radius: 50px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.3s ease;
      text-decoration: none;
      display: inline-block;
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
    }

    .btn-secondary {
      background: white;
      color: #667eea;
      border: 2px solid #667eea;
    }

    .btn-secondary:hover {
      background: #667eea;
      color: white;
    }

    /* Footer note */
    .error-footer {
      margin-top: 2rem;
      font-size: 14px;
      color: rgba(255,255,255,0.8);
      font-style: italic;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .error-card {
        padding: 2rem 1.5rem;
      }
      
      .btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  
  <!-- Floating particles -->
  <div class="particles" id="particles"></div>

  <!-- Main error container -->
  <div class="error-container">
    
    <!-- Large 404 background -->
    <div class="error-code">404</div>

    <!-- Content card -->
    <div class="error-card">
      
      <!-- Icon -->
      <div class="error-icon">💔</div>

      <!-- Title -->
      <h1 class="error-title">Oops! Halaman Tidak Ditemukan</h1>

      <!-- Main message -->
      <p class="error-message">
        Sepertinya kamu nyasar ke tempat yang salah nih...
      </p>

      <!-- ✏️ CUSTOM TEXT - EDIT BAGIAN INI -->
      <div class="error-custom">
        "yah mau gimana lagi:/"
      </div>

      <!-- Action buttons -->
      <div class="error-actions">
        <a href="/" class="btn btn-primary">
          ← Kembali ke Awal
        </a>
        </button>
      </div>

    </div>

    <!-- Footer note -->
    <p class="error-footer">
      "beberapa hal memang nggak bisa dipaksa" ✦
    </p>

  </div>

  <script>
    // Generate floating particles
    const particlesContainer = document.getElementById('particles');
    const particleCount = 50;

    for (let i = 0; i < particleCount; i++) {
      const particle = document.createElement('div');
      particle.className = 'particle';
      particle.style.left = Math.random() * 100 + '%';
      particle.style.top = Math.random() * 100 + '%';
      particle.style.animationDelay = Math.random() * 15 + 's';
      particle.style.animationDuration = (Math.random() * 10 + 10) + 's';
      particlesContainer.appendChild(particle);
    }

    // Optional: Easter egg - triple click untuk pesan rahasia
    let clickCount = 0;
    let clickTimer = null;

    document.querySelector('.error-icon').addEventListener('click', function() {
      clickCount++;
      
      if (clickTimer) clearTimeout(clickTimer);
      
      if (clickCount === 3) {
        const customText = document.querySelector('.error-custom');
        customText.innerHTML = '"plot twist: aku bercanda kok, aku masih sayang kamu 🥺💜"';
        customText.style.background = 'rgba(255, 105, 180, 0.1)';
        customText.style.borderColor = '#ff69b4';
        customText.style.color = '#ff69b4';
        clickCount = 0;
      }
      
      clickTimer = setTimeout(() => {
        clickCount = 0;
      }, 500);
    });
  </script>

</body>
</html>
